career-profile:
  title: Career Profile
  summary: |
    Software Engineering leader with a strong background in high-scale backend systems and Fintech, totaling 11 years of experience.  
    Currently managing large-scale .NET and Java projects at WEX, ensuring PCI DSS compliance and high availability for systems handling millions of daily transactions.  
    Deep expertise in the .NET ecosystem, including low-level optimizations (Roslyn, IL weaving) and distributed architectures (Kafka, gRPC, AWS).  
    Proven ability to lead complex projects through the entire software development lifecycle, focusing on architectural integrity and high-quality technical execution within multicultural and multidisciplinary environments.

